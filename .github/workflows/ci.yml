name: CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - "release/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release branch version
        run: |
          ref_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          if [[ ! "$ref_name" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Skipping release metadata check for $ref_name."
            exit 0
          fi

          expected_version="${BASH_REMATCH[1]}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(
            node -e "
              const fs = require('fs');
              const text = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
              const match = text.match(/^\\[package\\][\\s\\S]*?^version\\s*=\\s*\"([^\"]+)\"/m);
              if (!match) process.exit(1);
              console.log(match[1]);
            "
          )"
          cargo_lock_version="$(
            node -e "
              const fs = require('fs');
              const text = fs.readFileSync('src-tauri/Cargo.lock', 'utf8');
              const match = text.match(/^\\[\\[package\\]\\]\\s*\\nname\\s*=\\s*\"circuit\"\\s*\\nversion\\s*=\\s*\"([^\"]+)\"/m);
              if (!match) process.exit(1);
              console.log(match[1]);
            "
          )"

          failed=0
          check_version() {
            local name="$1"
            local actual="$2"

            if [ "$actual" != "$expected_version" ]; then
              echo "::error::$name version $actual does not match $ref_name ($expected_version)."
              failed=1
            fi
          }

          check_version "package.json" "$package_version"
          check_version "tauri.conf.json" "$tauri_version"
          check_version "Cargo.toml" "$cargo_version"
          check_version "Cargo.lock" "$cargo_lock_version"

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "Release metadata matches $ref_name."

  app:
    name: App checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:run

      - name: Build frontend
        run: pnpm build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('app/pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        run: pnpm test:e2e

  tauri:
    name: Tauri Rust tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/src-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Run Rust tests
        run: cargo test
