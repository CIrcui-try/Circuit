name: Beta Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: beta-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest

    outputs:
      app-version: ${{ steps.release.outputs.app_version }}
      tag: ${{ steps.release.outputs.tag }}
      macos-asset-name: ${{ steps.release.outputs.macos_asset_name }}
      windows-asset-name: ${{ steps.release.outputs.windows_asset_name }}

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: release
        run: |
          app_version="$(node -p "require('./package.json').version")"
          tag="v${app_version}-beta.${GITHUB_RUN_NUMBER}"
          macos_asset_name="Circuit-${app_version}-beta.${GITHUB_RUN_NUMBER}-aarch64.dmg"
          windows_asset_name="Circuit-${app_version}-beta.${GITHUB_RUN_NUMBER}-x64-setup.exe"

          {
            echo "app_version=${app_version}"
            echo "tag=${tag}"
            echo "macos_asset_name=${macos_asset_name}"
            echo "windows_asset_name=${windows_asset_name}"
          } >> "$GITHUB_OUTPUT"

  macos-dmg:
    name: Build Apple Silicon DMG
    runs-on: macos-14
    needs: release-metadata

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Prepare DMG artifact
        run: |
          dmg_path="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"

          if [ -z "$dmg_path" ]; then
            echo "No DMG was produced."
            exit 1
          fi

          mkdir -p release-assets
          cp "$dmg_path" "release-assets/${{ needs.release-metadata.outputs.macos-asset-name }}"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/release-assets/${{ needs.release-metadata.outputs.macos-asset-name }}
          if-no-files-found: error

  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: release-metadata

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NSIS installer
        run: pnpm tauri build --bundles nsis

      - name: Prepare Windows artifact
        shell: bash
        run: |
          installer_path="$(find src-tauri/target/release/bundle/nsis -maxdepth 1 -name '*.exe' -print -quit)"

          if [ -z "$installer_path" ]; then
            echo "No Windows installer was produced."
            exit 1
          fi

          mkdir -p release-assets
          cp "$installer_path" "release-assets/${{ needs.release-metadata.outputs.windows-asset-name }}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: app/release-assets/${{ needs.release-metadata.outputs.windows-asset-name }}
          if-no-files-found: error

  create-prerelease:
    name: Create GitHub prerelease
    runs-on: ubuntu-latest
    needs:
      - release-metadata
      - macos-dmg
      - windows-installer

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: app/release-assets
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<EOF
          Beta build from main.

          Commit: ${GITHUB_SHA}

          The macOS DMG is unsigned and not notarized. macOS Gatekeeper may show a warning during installation.
          The Windows installer is unsigned. Windows SmartScreen may show a warning during installation.
          EOF

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.release-metadata.outputs.tag }}" \
            "release-assets/${{ needs.release-metadata.outputs.macos-asset-name }}" \
            "release-assets/${{ needs.release-metadata.outputs.windows-asset-name }}" \
            --title "Circuit ${{ needs.release-metadata.outputs.tag }}" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA" \
            --prerelease \
            --latest=false
