name: Release Check

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - "release/**"
  workflow_run:
    workflows:
      - Beta Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate. Defaults to the latest release.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-check-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  release-metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release branch version
        run: |
          ref_name="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"

          if [[ ! "$ref_name" =~ ^release/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Skipping release metadata check for $ref_name."
            exit 0
          fi

          expected_version="${BASH_REMATCH[1]}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(
            node -e "
              const fs = require('fs');
              const text = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
              const match = text.match(/^\\[package\\][\\s\\S]*?^version\\s*=\\s*\"([^\"]+)\"/m);
              if (!match) process.exit(1);
              console.log(match[1]);
            "
          )"
          cargo_lock_version="$(
            node -e "
              const fs = require('fs');
              const text = fs.readFileSync('src-tauri/Cargo.lock', 'utf8');
              const match = text.match(/^\\[\\[package\\]\\]\\s*\\nname\\s*=\\s*\"circuit\"\\s*\\nversion\\s*=\\s*\"([^\"]+)\"/m);
              if (!match) process.exit(1);
              console.log(match[1]);
            "
          )"

          failed=0
          check_version() {
            local name="$1"
            local actual="$2"

            if [ "$actual" != "$expected_version" ]; then
              echo "::error::$name version $actual does not match $ref_name ($expected_version)."
              failed=1
            fi
          }

          check_version "package.json" "$package_version"
          check_version "tauri.conf.json" "$tauri_version"
          check_version "Cargo.toml" "$cargo_version"
          check_version "Cargo.lock" "$cargo_lock_version"

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

          echo "Release metadata matches $ref_name."

  release-artifacts:
    name: Validate GitHub Release artifacts
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: release-check
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          tag="$INPUT_TAG"

          if [ -z "$tag" ] && [ -n "$HEAD_SHA" ]; then
            tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases" --jq ".[] | select(.target_commitish == \"$HEAD_SHA\") | .tag_name" | head -n 1)"
          fi

          if [ -z "$tag" ]; then
            tag="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 1 --json tagName --jq '.[0].tagName')"
          fi

          if [ -z "$tag" ]; then
            echo "No release tag was found."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Download release DMG
        run: |
          mkdir -p release-assets
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "*.dmg" \
            --dir release-assets

      - name: Validate DMG
        run: |
          shopt -s nullglob
          dmgs=(release-assets/*.dmg)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "No DMG assets were found."
            exit 1
          fi

          mount_dir=""
          cleanup_mount() {
            if [ -n "$mount_dir" ] && [ -d "$mount_dir" ]; then
              hdiutil detach "$mount_dir" || true
            fi
          }
          trap cleanup_mount EXIT

          for dmg_path in "${dmgs[@]}"; do
            hdiutil verify "$dmg_path"

            mount_dir="$(mktemp -d)"
            hdiutil attach -readonly -nobrowse -mountpoint "$mount_dir" "$dmg_path"

            app_path="$(find "$mount_dir" -maxdepth 1 -name "*.app" -type d -print -quit)"
            if [ -z "$app_path" ]; then
              echo "No app bundle was found in $dmg_path."
              exit 1
            fi

            codesign --verify --deep --strict --verbose=4 "$app_path"

            hdiutil detach "$mount_dir"
            mount_dir=""
          done
